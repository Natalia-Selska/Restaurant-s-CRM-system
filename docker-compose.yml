version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: restaurant_postgres
    restart: always
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      TZ: Europe/Kyiv
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: postgres -c TimeZone=Europe/Kyiv

volumes:
  postgres_data:
